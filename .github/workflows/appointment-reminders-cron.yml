# Pings the appointment-reminder processor every minute so scheduled
# email/SMS reminders for calendar events actually fire on time.
#
# Reuses the same secrets as the marketing-email cron:
#   MARKETING_CRON_URL     = https://your-app.up.railway.app   (no path, no quotes)
#   MARKETING_CRON_SECRET  = same value as MARKETING_CRON_SECRET (or CRON_SECRET) on Railway
#
# Manual run: Actions tab → "Appointment reminders cron" → Run workflow

name: Appointment reminders cron

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

# Avoid overlapping runs if a single tick takes >60s.
concurrency:
  group: appointment-reminders-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/appointment-reminders
        env:
          MARKETING_CRON_URL: ${{ secrets.MARKETING_CRON_URL }}
          MARKETING_CRON_SECRET: ${{ secrets.MARKETING_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${MARKETING_CRON_URL:-}" ] || [ -z "${MARKETING_CRON_SECRET:-}" ]; then
            echo "::error::Missing secrets. Add MARKETING_CRON_URL and MARKETING_CRON_SECRET on THIS repo (Settings → Secrets → Actions)."
            exit 1
          fi
          ORIGIN="${MARKETING_CRON_URL#\"}"
          ORIGIN="${ORIGIN%\"}"
          ORIGIN="$(printf '%s' "$ORIGIN" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ORIGIN="${ORIGIN%/}"
          SECRET="$(printf '%s' "$MARKETING_CRON_SECRET" | tr -d '\r\n')"
          SECRET="$(printf '%s' "$SECRET" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          URL="${ORIGIN}/api/cron/appointment-reminders"
          echo "Requesting (host only): $(echo "$ORIGIN" | sed -E 's#^https?://##')"
          TMP="$(mktemp)"
          HTTP=$(curl -sS -o "$TMP" -w "%{http_code}" -H "Authorization: Bearer ${SECRET}" "$URL")
          BODY="$(cat "$TMP")"
          rm -f "$TMP"
          echo "HTTP status: $HTTP"
          echo "Response body: $BODY"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Expected HTTP 200, got $HTTP."
            exit 1
          fi
          if ! echo "$BODY" | grep -q '"ok"'; then
            echo "::error::Response missing ok:true"
            exit 1
          fi
          echo "Reminders cron ping OK."
