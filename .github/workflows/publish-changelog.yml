name: Publish Changelog on Deploy

on:
  push:
    branches: [main]

jobs:
  publish-changelog:
    runs-on: ubuntu-latest
    # Skip if commit message starts with 'chore', 'ci:', 'docs:' or contains [skip changelog]
    if: |
      !startsWith(github.event.head_commit.message, 'chore') &&
      !startsWith(github.event.head_commit.message, 'ci:') &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !contains(github.event.head_commit.message, '[skip changelog]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build changelog entry from commit
        id: build_entry
        # Untrusted inputs (commit message, sha) are passed via env so the
        # shell never sees them through `${{ }}` interpolation, which would
        # be vulnerable to script injection. See:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Determine category from conventional commit prefix
          if echo "$COMMIT_MSG" | grep -qiE '^(feat|add|new)'; then
            CATEGORY="feature"
          elif echo "$COMMIT_MSG" | grep -qiE '^(fix|bug|patch|hotfix)'; then
            CATEGORY="fix"
          else
            CATEGORY="improvement"
          fi

          # Get list of changed files for context
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | tr '\n' ', ' | sed 's/,$//')

          # Build a clean title from commit message (strip conventional prefix)
          TITLE=$(echo "$COMMIT_MSG" | sed 's/^feat: //i; s/^fix: //i; s/^add: //i; s/^chore: //i; s/^refactor: //i; s/^improve: //i; s/^update: //i' | cut -c1-100)

          # Capitalize first letter
          TITLE="$(echo "${TITLE:0:1}" | tr '[:lower:]' '[:upper:]')${TITLE:1}"

          # Build description that explains user benefit
          DESCRIPTION="This update ships improvements to $TITLE. Changed files: $CHANGED_FILES. Deployed from commit $SHORT_SHA."

          # Escape for JSON
          TITLE_JSON=$(echo "$TITLE" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")
          DESC_JSON=$(echo "$DESCRIPTION" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")

          echo "title=$TITLE_JSON" >> "$GITHUB_OUTPUT"
          echo "description=$DESC_JSON" >> "$GITHUB_OUTPUT"
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"

      - name: Post to changelog API
        # Pass step outputs and secrets via env so shell metacharacters that
        # may have survived the JSON encoding (e.g. backticks, $()) inside
        # the commit-derived title cannot be evaluated by bash.
        env:
          TITLE_JSON:        ${{ steps.build_entry.outputs.title }}
          DESCRIPTION_JSON:  ${{ steps.build_entry.outputs.description }}
          CATEGORY:          ${{ steps.build_entry.outputs.category }}
          COMMIT_SHA:        ${{ github.sha }}
          APP_URL:           ${{ secrets.APP_URL }}
          CHANGELOG_SECRET:  ${{ secrets.CHANGELOG_WEBHOOK_SECRET }}
        run: |
          # Build the JSON payload with python so every value is properly
          # quoted/escaped — never interpolate untrusted strings into a JSON
          # string by hand.
          PAYLOAD=$(python3 -c '
          import json, os
          # title and description are already JSON-encoded strings (e.g. "foo").
          # We need the unwrapped value so we can drop them into the payload dict.
          print(json.dumps({
              "title":       json.loads(os.environ["TITLE_JSON"]),
              "description": json.loads(os.environ["DESCRIPTION_JSON"]),
              "category":    os.environ["CATEGORY"],
              "version":     os.environ["COMMIT_SHA"],
          }))')

          curl -s -X POST "$APP_URL/api/admin/changelog" \
            -H "Content-Type: application/json" \
            -H "x-changelog-secret: $CHANGELOG_SECRET" \
            -d "$PAYLOAD" \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o /tmp/response.json \
            -w "\nHTTP status: %{http_code}\n"

          cat /tmp/response.json
